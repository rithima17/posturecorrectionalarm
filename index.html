<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Posture Correction Alarm</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.3/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.3/addons/p5.dom.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>Posture Correction Alarm</h1>
    <p>AI-powered posture monitoring system</p>
</div>

<div class="container">

    <div class="card">
        <h3>Live Monitoring</h3>
        <div id="video"></div>
        <p class="info-text">Click Start to activate camera</p>
    </div>

    <div class="card">
        <h3>System Info</h3>
        <p>This system uses AI to detect posture and alert when incorrect.</p>

        <button onclick="start()">Start Monitoring</button>
        <button onclick="stop()">Stop Monitoring</button>
    </div>

</div>

<div class="footer">
    Built with AI | Posture Monitoring System
</div>

<audio id="audioElement">
    <source src="alert.wav" type="audio/wav" />
</audio>

<!-- IMPORTANT: JS at bottom -->
<script src="video.js"></script>

</body>
</html>

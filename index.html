<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Posture Correction Alarm</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>Posture Correction Alarm</h1>
    <p>AI-powered posture monitoring system</p>
</div>

<div class="container">

    <div class="card">
        <h3>Live Monitoring</h3>
        <div id="video"></div>
        <p class="info-text">Click Start to activate camera</p>
    </div>

    <div class="card">
        <h3>Controls</h3>
        <button onclick="start()">Start Monitoring</button>
        <button onclick="stop()">Stop Monitoring</button>
        <button onclick="playBeep()">Test Beep</button>
    </div>

</div>

<div class="footer">
    Built with AI | Posture Monitoring System
</div>

<!-- AUDIO (use MP3) -->
<audio id="audioElement" src="alert.mp3"></audio>

<!-- JS -->
<script src="video.js"></script>

</body>
</html>
